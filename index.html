<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PNG 转 ZIP 图标包工具</title>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">PNG TO ZIP</p>
        <h1>将 PNG 图片导出为多尺寸 ZIP 图标包</h1>
        <p class="subtitle">
          纯前端本地处理，无需上传到服务器。上传大于 256x256 的 PNG 后，可一键下载
          16、32、48、64、128 五种尺寸的 PNG 压缩包。
        </p>
      </section>

      <section class="card">
        <div
          id="dropzone"
          class="dropzone"
          role="button"
          tabindex="0"
          aria-label="上传 PNG 图片"
        >
          <input id="fileInput" class="sr-only" type="file" accept="image/png" />
          <div class="dropzone-content">
            <p class="dropzone-title">拖拽 PNG 到这里，或点击选择文件</p>
            <p class="dropzone-hint">仅支持宽高都大于 256 像素的 PNG 图片</p>
          </div>
        </div>

        <div class="actions">
          <button id="downloadButton" class="button" type="button" disabled>
            下载 ZIP
          </button>
          <label class="toggle">
            <input id="roundedToggle" type="checkbox" />
            <span class="toggle-track" aria-hidden="true"></span>
            <span class="toggle-label">启用圆角</span>
          </label>
          <span id="statusText" class="status">请选择一个 PNG 文件</span>
        </div>

        <div class="result-grid">
          <div class="preview-card">
            <h2>预览</h2>
            <div class="preview-shell">
              <img id="previewImage" alt="PNG 预览" hidden />
              <p id="previewPlaceholder" class="placeholder">上传后将在这里显示预览</p>
            </div>
          </div>

          <div class="info-card">
            <h2>输出信息</h2>
            <dl class="info-list">
              <div>
                <dt>文件名</dt>
                <dd id="fileName">-</dd>
              </div>
              <div>
                <dt>原始尺寸</dt>
                <dd id="fileSize">-</dd>
              </div>
              <div>
                <dt>输出尺寸</dt>
                <dd>16 / 32 / 48 / 64 / 128</dd>
              </div>
              <div>
                <dt>圆角</dt>
                <dd id="cornerMode">关闭</dd>
              </div>
              <div>
                <dt>输出格式</dt>
                <dd>ZIP 压缩包（内含 PNG）</dd>
              </div>
            </dl>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
